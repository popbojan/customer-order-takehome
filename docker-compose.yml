services:
  catalog-db:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - catalog_pg:/var/lib/postgresql/data

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - order_pg:/var/lib/postgresql/data

  product-catalog-service:
    build:
      context: .
      dockerfile: product-catalog-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog
      SPRING_DATASOURCE_USERNAME: catalog
      SPRING_DATASOURCE_PASSWORD: catalog
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      catalog-db:
        condition: service_healthy

  customer-order-service:
    build:
      context: .
      dockerfile: customer-order-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orders
      SPRING_DATASOURCE_USERNAME: orders
      SPRING_DATASOURCE_PASSWORD: orders
      CATALOG_BASE_URL: http://product-catalog-service:8081
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 45s
    depends_on:
      order-db:
        condition: service_healthy
      product-catalog-service:
        condition: service_healthy

volumes:
  catalog_pg:
  order_pg:
