server:
  port: 8080

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/orders
    username: orders
    password: orders
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
